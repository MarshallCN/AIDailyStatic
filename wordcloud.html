<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Daily 词云</title>
  <meta name="description" content="基于近期 AI 新闻生成的关键词词云，支持按时间范围、分类和词频阈值查看。" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="styles.css?v=20260319-1" />
</head>
<body>
  <main class="wrap insight-wrap">
    <header class="site-header">
      <div>
        <h1>AI Daily 词云</h1>
        <div class="sub">从近期新闻里抽取高频词，过滤停用词后查看关注主题和支撑新闻。</div>
      </div>
      <nav class="site-nav" aria-label="主导航">
        <a class="nav-link" href="index.html">首页</a>
        <a class="nav-link active" href="wordcloud.html">词云</a>
        <a class="nav-link" href="clues.html">线索</a>
      </nav>
    </header>

    <section class="insight-toolbar">
      <div class="preset-row" id="wc-presets"></div>
      <div class="control-grid">
        <label class="field">
          <span>开始日期</span>
          <select id="wc-start-date"></select>
        </label>
        <label class="field">
          <span>结束日期</span>
          <select id="wc-end-date"></select>
        </label>
        <label class="field field-range">
          <span>最小词频</span>
          <input id="wc-min-frequency" type="range" min="1" max="6" step="1" value="2" />
          <strong id="wc-min-frequency-value">2</strong>
        </label>
      </div>
      <section class="toolbar" id="wc-categories"></section>
      <div class="insight-summary" id="wc-summary">正在加载历史新闻...</div>
    </section>

    <div class="insight-layout insight-layout-wordcloud">
      <section class="panel">
        <div class="panel-head">
          <h2>高频词云</h2>
          <span id="wc-cloud-meta"></span>
        </div>
        <div class="wordcloud-canvas" id="wordcloud-canvas"></div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <h2>词条详情</h2>
        </div>
        <div class="term-detail" id="wc-detail">等待词云生成...</div>
      </aside>
    </div>

    <div class="empty hidden" id="wc-empty">当前范围内暂无足够的词云数据。</div>
  </main>

  <script src="news/manifest.js?v=20260319"></script>
  <script src="parse-news.js?v=20260319-1"></script>
  <script src="news-store.js?v=20260319-1"></script>
  <script src="analysis-utils.js?v=20260319-1"></script>
  <script src="vendor/wordcloud2.js"></script>
  <script src="wordcloud.js?v=20260319-1"></script>
</body>
</html>
