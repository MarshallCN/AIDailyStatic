<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Daily 洞察</title>
  <meta name="description" content="基于静态知识图谱、滚动线索与近期/长期记忆生成的 AI Daily 洞察报告。" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="styles.css?v=20260327-3" />
</head>
<body>
  <main class="wrap insight-wrap">
    <header class="site-header">
      <div>
        <h1>AI Daily 洞察</h1>
        <div class="sub">把每日新闻、滚动线索图与近期/长期记忆压缩成可追溯的静态洞察报告。</div>
      </div>
      <nav class="site-nav" aria-label="主导航">
        <a class="nav-link" href="index.html">首页</a>
        <a class="nav-link" href="wordcloud.html">词云</a>
        <a class="nav-link" href="clues.html">线索</a>
        <a class="nav-link active" href="insights.html">洞察</a>
      </nav>
    </header>

    <section class="insight-toolbar">
      <div class="control-grid control-grid-insight">
        <label class="field">
          <span>报告日期</span>
          <select id="insight-date"></select>
        </label>
      </div>
      <div class="insight-summary" id="insight-summary">正在加载洞察报告...</div>
    </section>

    <section class="panel report-overview-panel">
      <div class="panel-head">
        <h2>报告总览</h2>
        <div class="panel-actions">
          <span id="insight-meta"></span>
        </div>
      </div>
      <div class="report-overview" id="insight-overview"></div>
    </section>

    <section class="panel report-memory-panel">
      <div class="panel-head">
        <h2>记忆状态</h2>
      </div>
      <div class="report-memory" id="insight-memory"></div>
    </section>

    <section class="theme-list" id="insight-themes"></section>

    <div class="empty hidden" id="insight-empty">当前还没有可展示的洞察报告。</div>
  </main>

  <script src="insights/manifest.js?v=20260327-1"></script>
  <script src="insight-store.js?v=20260327-1"></script>
  <script src="analysis-utils.js?v=20260319-1"></script>
  <script src="vendor/d3.min.js"></script>
  <script src="graph-view.js?v=20260327-3"></script>
  <script src="insights.js?v=20260327-2"></script>
</body>
</html>
